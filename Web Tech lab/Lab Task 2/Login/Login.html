<!DOCTYPE html> 
<html lang="en">    
    <head>        
        <meta charset="UTF-8">        
        <meta http-equiv="X-UA-Compatible" content="IE=edge">        
        <meta name="viewport" content="width=device-width, initial-scale=1.0">        
        <title>Login</title>
        <link rel="stylesheet" href="../Design/Design.css">
    </head>
    <body>
    
        <div class="login-container">
            
            <form id="loginForm" onsubmit="return validateForm()">
                 <h2>Login</h2>
                <table>
                <tr>
                <td><label for="username">Username:</label></td>
                <td><input type="text" id="username" name="username" placeholder="Enter your username" ><br><br><td></td>
                </tr>
                <tr>
                <td><label for="password">Password:</label></td>
                <td><input type="password" id="password" name="password" placeholder="Enter your password"><br><br></td>
                </tr>
                
                </table>
                <div class="lgbtn-container">
                   
                    <button type="submit" id="loginBtn">Login</button>
                    </div>
<p id="message"></p>

            </form>
             <script src="../Script/script.js"></script>
    </body>
</html>
