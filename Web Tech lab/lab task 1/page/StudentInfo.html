<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Student Information</title>
        <link rel="stylesheet" href="../Design/Design.css">
    </head>
    <body>

        <div class="container">
            <fieldset>
                <legend>Student Information Form</legend>
            <form>
                <table>
                <tr>

                <td><label for="name">Full Name(Text)</label></td>
                <td><input type="text" id="name" name="name" placeholder="Enter your Name" ></td>
                </tr>
                 <tr>
                <td><label for="email">Email Address</label></td>
                <td><input type="email" id="email" name="email" placeholder="Enter your Email" ></td>
                </tr>
                <tr>
                <td><label for="password">Password</label></td>
                <td><input type="password" id="password" name="password" placeholder="Enter your Password" ></td>
                </tr>
                <tr>
                <td><label for ="age">Age</label></td>
                <td><input type="number" id="age" name="age" placeholder="Enter your Age" ></td>
                </tr>
                <tr>
                <td><label for ="date">Experiment Date</label></td>
                <td><input type="date" id="date" name="date" placeholder="Select Experiment Date" ></td>
                </tr>
                <tr>
                <td><label for="phnumber">Phone Number(Tel)</label></td>
                <td><input type="tel" id="phnumber" name="phnumber" placeholder="+8801xxxxxxxx" ></td>
                </tr>
                </table>
                <input type="submit" id="submit" value="Submit">
               
                  <input type="reset" id="clear" value="Clear">



            </form>
            </fieldset>
            
        </div>
        
    </body>
</html>
