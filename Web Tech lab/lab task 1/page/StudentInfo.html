<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information</title>
    <link rel="stylesheet" href="../Design/Design.css">
</head>
<body>

    <div class="container">
        <fieldset>
            <legend>Student Information</legend>

            <form>
                <div class="form-grid">

                    <div class="form-group">
                        <label for="name">Full Name (Text)</label>
                        <input type="text" id="name" name="name" placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="your.email@example.com">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter secure password">
                    </div>

                    <div class="form-group">
                        <label for="age">Age (Number)</label>
                        <input type="number" id="age" name="age" placeholder="Enter your age">
                    </div>

                    <div class="form-group">
                        <label for="date">Experiment Date</label>
                        <input type="date" id="date" name="date">
                    </div>

                    <div class="form-group">
                        <label for="phnumber">Phone Number (Tel)</label>
                        <input type="tel" id="phnumber" name="phnumber" placeholder="+880 XXXX XXXXXX">
                    </div>

                </div>

                <div class="button-row">
                    <input type="submit" id="submit" value="Submit">
                    <input type="reset" id="clear" value="Clear">
                </div>
            </form>
        </fieldset>
    </div>

</body>
</html>
